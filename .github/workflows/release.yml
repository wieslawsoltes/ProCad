name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release, for example 0.1.0-preview.1'
        required: true
        type: string
      prerelease:
        description: 'Mark the GitHub release as prerelease'
        required: false
        type: boolean
        default: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_VERSION: 10.0.x

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Verify repository rename
        shell: bash
        run: scripts/verify-procad-rename.sh

      - name: Restore focused projects
        run: |
          dotnet restore ProCad.Desktop/ProCad.Desktop.csproj --nologo
          dotnet restore ProCad.TraceCli/ProCad.TraceCli.csproj --nologo
          dotnet restore ProCad.Controls.Avalonia/ProCad.Controls.Avalonia.csproj --nologo
          dotnet restore ProCad.Collaboration.ServerHost/ProCad.Collaboration.ServerHost.csproj --nologo
          dotnet restore ProCad.Tests/ProCad.Tests.csproj --nologo
          dotnet restore ProCad.Editing.Tests/ProCad.Editing.Tests.csproj --nologo
          dotnet restore ProCad.Controls.Tests/ProCad.Controls.Tests.csproj --nologo

      - name: Build focused projects
        run: |
          dotnet build ProCad.Desktop/ProCad.Desktop.csproj -c Debug --no-restore --nologo -v minimal
          dotnet build ProCad.TraceCli/ProCad.TraceCli.csproj -c Debug --no-restore --nologo -v minimal
          dotnet build ProCad.Controls.Avalonia/ProCad.Controls.Avalonia.csproj -c Debug --no-restore --nologo -v minimal
          dotnet build ProCad.Collaboration.ServerHost/ProCad.Collaboration.ServerHost.csproj -c Debug --no-restore --nologo -v minimal

      - name: Run tests
        run: |
          dotnet test ProCad.Tests/ProCad.Tests.csproj -c Debug --no-restore --nologo -m:1 --logger trx --results-directory artifacts/test-results/procad
          dotnet test ProCad.Editing.Tests/ProCad.Editing.Tests.csproj -c Debug --no-restore --nologo -m:1 --logger trx --results-directory artifacts/test-results/editing
          dotnet test ProCad.Controls.Tests/ProCad.Controls.Tests.csproj -c Debug --no-restore --nologo -m:1 --logger trx --results-directory artifacts/test-results/controls

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-test-results-${{ matrix.os }}
          path: artifacts/test-results/**/*.trx
          if-no-files-found: ignore
          retention-days: 14

  full-solution:
    name: Full solution validation (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore workloads
        run: dotnet workload restore

      - name: Restore solution
        run: dotnet restore ProCad.slnx --nologo

      - name: Build solution
        run: dotnet build ProCad.slnx -c Release --no-restore --nologo -v minimal

  pack:
    name: Pack packages
    runs-on: ubuntu-latest
    needs: [validate, full-solution]
    outputs:
      version: ${{ steps.version.outputs.value }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
            prerelease="${{ github.event.inputs.prerelease }}"
          else
            version="${GITHUB_REF_NAME#v}"
            if [[ "${version}" == *"-"* ]]; then
              prerelease="true"
            else
              prerelease="false"
            fi
          fi
          echo "value=${version}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"
          echo "VERSION=${version}" >> "${GITHUB_ENV}"

      - name: Restore package projects
        run: |
          dotnet restore ProCad.Core/ProCad.Core.csproj --nologo
          dotnet restore ProCad.IO/ProCad.IO.csproj --nologo
          dotnet restore ProCad.Rendering/ProCad.Rendering.csproj --nologo
          dotnet restore ProCad.Controls/ProCad.Controls.csproj --nologo
          dotnet restore ProCad.Controls.Skia/ProCad.Controls.Skia.csproj --nologo
          dotnet restore ProCad.Controls.Avalonia/ProCad.Controls.Avalonia.csproj --nologo
          dotnet restore ProCad.Controls.Uno/ProCad.Controls.Uno.csproj --nologo

      - name: Pack non-MAUI packages
        run: |
          dotnet pack ProCad.Core/ProCad.Core.csproj -c Release --no-restore --nologo -o artifacts/packages /p:Version=${VERSION} /p:PackageVersion=${VERSION}
          dotnet pack ProCad.IO/ProCad.IO.csproj -c Release --no-restore --nologo -o artifacts/packages /p:Version=${VERSION} /p:PackageVersion=${VERSION}
          dotnet pack ProCad.Rendering/ProCad.Rendering.csproj -c Release --no-restore --nologo -o artifacts/packages /p:Version=${VERSION} /p:PackageVersion=${VERSION}
          dotnet pack ProCad.Controls/ProCad.Controls.csproj -c Release --no-restore --nologo -o artifacts/packages /p:Version=${VERSION} /p:PackageVersion=${VERSION}
          dotnet pack ProCad.Controls.Skia/ProCad.Controls.Skia.csproj -c Release --no-restore --nologo -o artifacts/packages /p:Version=${VERSION} /p:PackageVersion=${VERSION}
          dotnet pack ProCad.Controls.Avalonia/ProCad.Controls.Avalonia.csproj -c Release --no-restore --nologo -o artifacts/packages /p:Version=${VERSION} /p:PackageVersion=${VERSION}
          dotnet pack ProCad.Controls.Uno/ProCad.Controls.Uno.csproj -c Release --no-restore --nologo -o artifacts/packages /p:Version=${VERSION} /p:PackageVersion=${VERSION}

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: release-nuget-packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error
          retention-days: 90

  pack-maui:
    name: Pack MAUI package
    runs-on: macos-latest
    needs: [validate, full-solution]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Resolve version
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=${version}" >> "${GITHUB_ENV}"

      - name: Restore workloads
        run: dotnet workload restore ProCad.Controls.Maui/ProCad.Controls.Maui.csproj

      - name: Restore MAUI package
        run: dotnet restore ProCad.Controls.Maui/ProCad.Controls.Maui.csproj --nologo

      - name: Pack MAUI package
        run: dotnet pack ProCad.Controls.Maui/ProCad.Controls.Maui.csproj -c Release --no-restore --nologo -o artifacts/maui-packages /p:Version=${VERSION} /p:PackageVersion=${VERSION}

      - name: Upload MAUI package
        uses: actions/upload-artifact@v7
        with:
          name: release-maui-nuget-packages
          path: |
            artifacts/maui-packages/*.nupkg
            artifacts/maui-packages/*.snupkg
          if-no-files-found: error
          retention-days: 90

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [pack, pack-maui]
    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          pattern: release-*-packages
          path: artifacts/packages
          merge-multiple: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish to NuGet
        if: ${{ github.ref_type == 'tag' }}
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        shell: bash
        run: |
          if [ -z "${NUGET_API_KEY}" ]; then
            echo "::warning::NUGET_API_KEY is not configured; skipping NuGet publish."
            exit 0
          fi
          shopt -s nullglob
          for package in artifacts/packages/*.nupkg artifacts/packages/*.snupkg; do
            dotnet nuget push "$package" --api-key "${NUGET_API_KEY}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', needs.pack.outputs.version) }}
          name: Release ${{ needs.pack.outputs.version }}
          prerelease: ${{ needs.pack.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
