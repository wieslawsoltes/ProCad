name: Build

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'release/**'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_VERSION: 10.0.x

jobs:
  focused:
    name: Focused build and tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Verify repository rename
        shell: bash
        run: scripts/verify-procad-rename.sh

      - name: Restore focused projects
        run: |
          dotnet restore ProCad.Desktop/ProCad.Desktop.csproj --nologo -p:Configuration=Release
          dotnet restore ProCad.TraceCli/ProCad.TraceCli.csproj --nologo -p:Configuration=Release
          dotnet restore ProCad.Controls.Avalonia/ProCad.Controls.Avalonia.csproj --nologo -p:Configuration=Release
          dotnet restore ProCad.Collaboration.ServerHost/ProCad.Collaboration.ServerHost.csproj --nologo -p:Configuration=Release
          dotnet restore ProCad.Tests/ProCad.Tests.csproj --nologo -p:Configuration=Release
          dotnet restore ProCad.Editing.Tests/ProCad.Editing.Tests.csproj --nologo -p:Configuration=Release
          dotnet restore ProCad.Controls.Tests/ProCad.Controls.Tests.csproj --nologo -p:Configuration=Release

      - name: Build focused projects
        run: |
          dotnet build ProCad.Desktop/ProCad.Desktop.csproj -c Release --no-restore --nologo -v minimal
          dotnet build ProCad.TraceCli/ProCad.TraceCli.csproj -c Release --no-restore --nologo -v minimal
          dotnet build ProCad.Controls.Avalonia/ProCad.Controls.Avalonia.csproj -c Release --no-restore --nologo -v minimal
          dotnet build ProCad.Collaboration.ServerHost/ProCad.Collaboration.ServerHost.csproj -c Release --no-restore --nologo -v minimal

      - name: Test ProCad
        run: dotnet test ProCad.Tests/ProCad.Tests.csproj -c Release --no-restore --nologo -m:1 --logger trx --results-directory artifacts/test-results/procad

      - name: Test editing
        run: dotnet test ProCad.Editing.Tests/ProCad.Editing.Tests.csproj -c Release --no-restore --nologo -m:1 --logger trx --results-directory artifacts/test-results/editing

      - name: Test controls
        run: dotnet test ProCad.Controls.Tests/ProCad.Controls.Tests.csproj -c Release --no-restore --nologo -m:1 --logger trx --results-directory artifacts/test-results/controls

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: artifacts/test-results/**/*.trx
          if-no-files-found: ignore
          retention-days: 7

      - name: Publish test results
        if: ${{ always() && (github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]')) }}
        uses: dorny/test-reporter@v3
        with:
          name: Test Results (${{ matrix.os }})
          path: artifacts/test-results/**/*.trx
          reporter: dotnet-trx
          fail-on-empty: false

  browser:
    name: Browser build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install WebAssembly workload
        run: dotnet workload install wasm-tools --ignore-failed-sources --skip-manifest-update

      - name: Restore browser
        run: dotnet restore ProCad.Browser/ProCad.Browser.csproj --nologo

      - name: Build browser
        run: dotnet build ProCad.Browser/ProCad.Browser.csproj -c Release --no-restore --nologo -v minimal

  full-solution-macos:
    name: Full solution build (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore workloads
        run: dotnet workload restore

      - name: Restore solution
        run: dotnet restore ProCad.slnx --nologo

      - name: Build solution
        run: dotnet build ProCad.slnx -c Release --no-restore --nologo -v minimal

  pack:
    name: Pack packages
    runs-on: ubuntu-latest
    needs: [focused, browser, full-solution-macos]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore package projects
        run: |
          dotnet restore ProCad.Core/ProCad.Core.csproj --nologo
          dotnet restore ProCad.IO/ProCad.IO.csproj --nologo
          dotnet restore ProCad.Rendering/ProCad.Rendering.csproj --nologo
          dotnet restore ProCad.Controls/ProCad.Controls.csproj --nologo
          dotnet restore ProCad.Controls.Skia/ProCad.Controls.Skia.csproj --nologo
          dotnet restore ProCad.Controls.Avalonia/ProCad.Controls.Avalonia.csproj --nologo
          dotnet restore ProCad.Controls.Uno/ProCad.Controls.Uno.csproj --nologo

      - name: Pack packages
        run: |
          dotnet pack ProCad.Core/ProCad.Core.csproj -c Release --no-restore --nologo -o artifacts/packages
          dotnet pack ProCad.IO/ProCad.IO.csproj -c Release --no-restore --nologo -o artifacts/packages
          dotnet pack ProCad.Rendering/ProCad.Rendering.csproj -c Release --no-restore --nologo -o artifacts/packages
          dotnet pack ProCad.Controls/ProCad.Controls.csproj -c Release --no-restore --nologo -o artifacts/packages
          dotnet pack ProCad.Controls.Skia/ProCad.Controls.Skia.csproj -c Release --no-restore --nologo -o artifacts/packages
          dotnet pack ProCad.Controls.Avalonia/ProCad.Controls.Avalonia.csproj -c Release --no-restore --nologo -o artifacts/packages
          dotnet pack ProCad.Controls.Uno/ProCad.Controls.Uno.csproj -c Release --no-restore --nologo -o artifacts/packages

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error
          retention-days: 30
